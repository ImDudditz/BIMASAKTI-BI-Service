<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

</head>
<body class="bg-gray-50 text-gray-800 font-sans">
<div id="app" class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-blue-600 text-white shadow-md p-4 flex justify-between items-center" v-if="isAuthenticated">
        <h1 class="text-xl font-bold">BI SaaS Manager</h1>
        <div>
            <button @click="tab = 'companies'" :class="{'font-bold underline': tab==='companies'}" class="mr-4 hover:text-blue-200">Companies</button>
            <button @click="tab = 'permissions'" :class="{'font-bold underline': tab==='permissions'}" class="mr-4 hover:text-blue-200">Permissions</button>

            <button @click="openAuditTab" :class="{'font-bold underline': tab==='audit'}" class="mr-4 hover:text-blue-200">Audit Logs</button>
            <button @click="logout" class="bg-blue-700 px-3 py-1 rounded hover:bg-blue-800">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="flex-grow p-8 max-w-6xl mx-auto w-full">
        <!-- Login Screen -->
        <div v-if="!isAuthenticated" class="max-w-sm mx-auto mt-20 bg-white p-6 rounded-lg shadow-lg border border-gray-200">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">SuperAdmin Login</h2>
            <form @submit.prevent="login">
                <input type="password" v-model="password" placeholder="Enter Password" class="w-full border p-3 rounded mb-4 focus:outline-none focus:border-blue-500" required>
                <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">Login</button>
            </form>
            <p v-if="loginError" class="text-red-500 text-sm mt-3 text-center">{{ loginError }}</p>
        </div>

        <div v-else>
            <!-- Companies Tab -->
            <div v-if="tab === 'companies'" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- List -->
                <div class="col-span-1 bg-white p-4 rounded-lg shadow border">
                    <h3 class="font-bold text-lg mb-4 border-b pb-2">Tenants</h3>
                    <div class="space-y-2 max-h-96 overflow-y-auto pr-2">
                        <button v-for="c in companies" :key="c.companyId" @click="selectCompany(c.companyId)" 
                                :class="{'bg-blue-100 border-blue-500': selectedCompanyId === c.companyId, 'hover:bg-gray-50': selectedCompanyId !== c.companyId}"
                                class="w-full text-left p-3 border rounded transition flex justify-between items-center">
                            <span class="font-bold">{{ c.companyId }}</span>
                            <span :class="c.isActive ? 'text-green-500' : 'text-red-500'" class="text-sm font-bold">{{ c.isActive ? 'Active' : 'Inactive' }}</span>
                        </button>
                    </div>
                    <button @click="clearForm" class="w-full mt-4 bg-gray-100 hover:bg-gray-200 text-gray-700 p-2 rounded font-bold">+ New Company</button>
                </div>

                <!-- Form -->
                <div class="col-span-2 bg-white p-6 rounded-lg shadow border">
                    <h3 class="font-bold text-lg mb-4 border-b pb-2">{{ isEditing ? 'Edit: ' + selectedCompanyId : 'Register New Company' }}</h3>
                    <form @submit.prevent="saveCompany">
                        <div class="mb-4">
                            <label class="block text-sm font-bold mb-1">Company ID (5 chars)</label>
                            <input v-model="form.companyId" :disabled="isEditing" maxlength="5" required class="w-full border p-2 rounded bg-gray-50 uppercase font-mono" placeholder="e.g. ALPHA">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-bold mb-1 flex items-center">
                                <input type="checkbox" v-model="form.isActive" class="mr-2 w-4 h-4 text-blue-600"> Active Tenant
                            </label>
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-bold mb-1">Sync URLs (One per line)</label>
                            <textarea v-model="form.syncUrls" rows="5" class="w-full border p-2 rounded font-mono text-sm" placeholder="https://api.example.com/sync_table"></textarea>
                        </div>
                        <div class="flex gap-4">
                            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded">Save Configuration</button>
                            <button v-if="isEditing" type="button" @click="syncData" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded flex-1">Trigger Sync Now</button>
                            <button v-if="isEditing" type="button" @click="viewLogs" class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-6 rounded">View Activity Log</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Permissions Tab -->
            <div v-if="tab === 'permissions'" class="bg-white p-6 rounded-lg shadow border max-w-4xl mx-auto">
                <h3 class="font-bold text-lg mb-6 border-b pb-2">Access Control</h3>
                
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div>
                        <label class="block text-sm font-bold mb-1">Company</label>
                        <select v-model="permSelectedCompany" @change="loadUsers" class="w-full border p-2 rounded bg-gray-50">
                            <option value="">-- Select Company --</option>
                            <option v-for="c in companies" :key="c.companyId" :value="c.companyId">{{ c.companyId }}</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">User</label>
                        <select v-model="permSelectedUser" @change="loadPermissions" :disabled="!permSelectedCompany" class="w-full border p-2 rounded bg-gray-50">
                            <option value="">-- Select User --</option>
                            <option v-for="u in users" :key="u.id" :value="u.id">{{ u.username }}</option>
                        </select>
                    </div>
                </div>

                <div v-if="permSelectedUser" class="space-y-6">
                    <div>
                        <h4 class="font-bold text-gray-700 mb-3 bg-gray-100 p-2 rounded">Widget Access</h4>
                        <div class="grid grid-cols-2 gap-3">
                            <label v-for="w in availableWidgets" :key="w.key" class="flex items-center space-x-2 cursor-pointer p-2 hover:bg-blue-50 rounded border border-transparent hover:border-blue-200">
                                <input type="checkbox" v-model="permissions.widgets[w.key]" class="w-4 h-4 text-blue-600 rounded">
                                <span class="text-sm font-medium">{{ w.label }}</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <h4 class="font-bold text-gray-700 mb-3 bg-gray-100 p-2 rounded">Report Access</h4>
                        <div class="grid grid-cols-2 gap-3">
                            <label v-for="r in availableReports" :key="r.key" class="flex items-center space-x-2 cursor-pointer p-2 hover:bg-blue-50 rounded border border-transparent hover:border-blue-200">
                                <input type="checkbox" v-model="permissions.reports[r.key]" class="w-4 h-4 text-blue-600 rounded">
                                <span class="text-sm font-medium">{{ r.label }}</span>
                            </label>
                        </div>
                    </div>
                    <button @click="savePermissions" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded mt-4">Save Permissions</button>
                </div>
            </div>

            <!-- Audit Tab -->
            <div v-if="tab === 'audit'" class="bg-white p-6 rounded-lg shadow border max-w-5xl mx-auto">
                <div class="flex justify-between items-center mb-6 border-b pb-2">
                    <h3 class="font-bold text-lg">System Audit Logs</h3>
                    <button @click="fetchAuditLogs" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-1 px-4 rounded text-sm">Refresh Logs</button>
                </div>
                <div class="bg-gray-900 border p-4 rounded overflow-auto h-[60vh]">
                    <pre class="text-green-400 text-sm font-mono whitespace-pre-wrap">{{ systemAuditLogs }}</pre>
                </div>
            </div>

        </div>
    </div>
    <!-- Activity Log Modal -->
    <div v-if="showLogModal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-40 p-4">
        <div class="bg-gray-900 rounded-lg shadow-2xl w-full max-w-5xl flex flex-col h-[80vh] border border-gray-700">
            <div class="flex justify-between items-center p-4 border-b border-gray-700">
                <h3 class="text-white font-bold text-lg font-mono">Activity Log: {{ selectedCompanyId }}</h3>
                <div class="flex gap-3">
                    <button @click="refreshLogs" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1 rounded font-bold text-sm">Refresh</button>
                    <button @click="closeLogs" class="bg-red-600 hover:bg-red-700 text-white px-4 py-1 rounded font-bold text-sm">Close</button>
                </div>
            </div>
            <div class="flex-grow p-4 overflow-auto bg-black">
                <pre class="text-green-400 font-mono text-sm whitespace-pre-wrap">{{ activityLogs }}</pre>
            </div>
        </div>
    </div>
    
    <!-- Toasts -->
    <div class="fixed bottom-4 right-4 space-y-2 z-50">
        <div v-for="t in toasts" :key="t.id" class="px-6 py-3 rounded shadow-lg font-bold text-white transition-opacity duration-300" 
             :class="{'bg-green-500': t.type==='success', 'bg-red-500': t.type==='error', 'bg-blue-500': t.type==='info'}">
            {{ t.msg }}
        </div>
    </div>
</div>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: #94a3b8; }

    /* --- GLOBAL STYLES --- */
    :root {
        --excel-green: #217346;
        --excel-light-gray: #f3f2f1;
        --excel-border: #c8c6c4;
        --text-color: #323130;
    }
    

</style>
<script>
// ==========================================
// ENVIRONMENT CONFIGURATION
// ==========================================
window.CONFIG = {
    // Leave blank ("") to automatically detect the base URL (useful for IIS Virtual Directories).
    // Set to a specific URL (e.g., "http://localhost:5000") if your API is hosted elsewhere.
    API_BASE_URL: "" 
};

const { createApp, ref, reactive, onMounted, watch, computed } = Vue;

createApp({
    setup() {
        const isAuthenticated = ref(false);
        const password = ref('');
        const loginError = ref('');
        const tab = ref('companies');
        
        const companies = ref([]);
        const selectedCompanyId = ref('');
        const isEditing = ref(false);
        const form = reactive({ companyId: '', isActive: true, syncUrls: '' });
        
        const users = ref([]);
        const permSelectedCompany = ref('');
        const permSelectedUser = ref('');
        const permissions = reactive({ widgets: {}, reports: {} });
        
        const showLogModal = ref(false);
        const activityLogs = ref('');

        const systemAuditLogs = ref('Loading...');

        const toasts = ref([]);
        const showToast = (msg, type='info') => {
            const id = Date.now() + Math.random();
            toasts.value.push({ id, msg, type });
            setTimeout(() => { toasts.value = toasts.value.filter(t => t.id !== id); }, 3000);
        };

        const api = async (url, options = {}) => {
            options.credentials = 'include';
            if (options.body) {
                options.headers = { ...options.headers, 'Content-Type': 'application/json' };
                options.body = JSON.stringify(options.body);
            }
            
            // Dynamically resolve base URL to support IIS Virtual Directories
            let baseUrl = window.CONFIG.API_BASE_URL;
            if (!baseUrl) {
                baseUrl = window.location.pathname;
                if (baseUrl.endsWith('.html')) baseUrl = baseUrl.substring(0, baseUrl.lastIndexOf('/'));
                if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
            }

            const res = await fetch(baseUrl + '/api' + url, options);
            if (res.status === 401) {
                isAuthenticated.value = false;
                throw new Error('Unauthorized');
            }
            return res.ok ? await res.json() : Promise.reject(await res.json().catch(()=>({})));
        };

        const checkAuth = async () => {
            try {
                await api('/me');
                isAuthenticated.value = true;
                loadCompanies();
                await loadAvailableWidgets();
            } catch (e) { isAuthenticated.value = false; }
        };

        const login = async () => {
            try {
                await api('/login', { method: 'POST', body: { password: password.value } });
                isAuthenticated.value = true;
                loginError.value = '';
                loadCompanies();
                await loadAvailableWidgets();
            } catch (e) { loginError.value = 'Invalid password'; }
        };
        
        const logout = async () => {
            await api('/logout', { method: 'POST' });
            isAuthenticated.value = false;
            password.value = '';
        };

        const loadCompanies = async () => {
            try {
                companies.value = await api('/companies/details');
            } catch (e) { showToast('Failed to load companies', 'error'); }
        };

        const clearForm = () => {
            selectedCompanyId.value = '';
            isEditing.value = false;
            form.companyId = '';
            form.isActive = true;
            form.syncUrls = '';
        };

        const selectCompany = async (id) => {
            try {
                const data = await api(`/companies/${id}`);
                selectedCompanyId.value = id;
                isEditing.value = true;
                form.companyId = id;
                form.isActive = data.isActive;
                form.syncUrls = (data.urls || []).join('\n');
            } catch (e) { showToast('Failed to load company details', 'error'); }
        };

        const saveCompany = async () => {
            if (form.companyId.length !== 5) {
                return showToast('Company ID must be 5 characters', 'error');
            }
            try {
                await api('/companies', {
                    method: 'POST',
                    body: { 
                        CompanyId: form.companyId.toUpperCase(), 
                        Mode: isEditing.value ? 'Update' : 'New',
                        IsActive: form.isActive,
                        SyncUrls: form.syncUrls 
                    }
                });
                showToast('Company saved successfully', 'success');
                await loadCompanies();
                if (!isEditing.value) selectCompany(form.companyId.toUpperCase());
            } catch (e) { showToast(e.message || 'Failed to save', 'error'); }
        };

        const syncData = async () => {
            try {
                await api(`/companies/${selectedCompanyId.value}/sync`, { method: 'POST' });
                showToast('Sync triggered in background', 'success');
            } catch (e) { showToast('Sync failed to start', 'error'); }
        };

        const fetchLogs = async () => {
            try {
                const data = await api(`/companies/${selectedCompanyId.value}/logs`);
                activityLogs.value = data.logs || "No logs available.";
            } catch (e) { 
                activityLogs.value = "Failed to load logs.";
            }
        };

        const viewLogs = () => {
            showLogModal.value = true;
            activityLogs.value = "Loading...";
            fetchLogs();
        };

        const refreshLogs = () => {
            fetchLogs();
        };

        const closeLogs = () => {
            showLogModal.value = false;
        };

        const fetchAuditLogs = async () => {
            systemAuditLogs.value = "Loading...";
            try {
                const data = await api(`/audit-logs`);
                systemAuditLogs.value = data.logs || "No audit logs available.";
            } catch (e) { 
                systemAuditLogs.value = "Failed to load audit logs.";
            }
        };

        const openAuditTab = () => {
            tab.value = 'audit';
            fetchAuditLogs();
        };

        // Permissions
        const loadUsers = async () => {
            permSelectedUser.value = '';
            permissions.widgets = {};
            permissions.reports = {};
            if (!permSelectedCompany.value) return users.value = [];
            try {
                users.value = await api(`/manager/companies/${permSelectedCompany.value}/users`);
            } catch (e) { showToast('Failed to load users', 'error'); }
        };

        const loadPermissions = async () => {
            if (!permSelectedUser.value) return;
            try {
                const data = await api(`/manager/companies/${permSelectedCompany.value}/users/${permSelectedUser.value}/permissions`);
                availableWidgets.value.forEach(w => permissions.widgets[w.key] = !!data.widgets[w.key]);
                availableReports.forEach(r => permissions.reports[r.key] = !!data.reports[r.key]);
            } catch (e) { showToast('Failed to load permissions', 'error'); }
        };

        const savePermissions = async () => {
            try {
                await api(`/manager/companies/${permSelectedCompany.value}/users/${permSelectedUser.value}/permissions`, {
                    method: 'POST',
                    body: { widgets: permissions.widgets, reports: permissions.reports }
                });
                showToast('Permissions saved', 'success');
            } catch (e) { showToast('Failed to save permissions', 'error'); }
        };

        const availableWidgets = ref([]);
        const loadAvailableWidgets = async () => {
            try {
                availableWidgets.value = await api('/manager/widgets');
            } catch (e) {
                showToast('Failed to load system widgets', 'error');
            }
        };

        const availableReports = [
            { key: 'balance_sheet', label: 'Balance Sheet Statement' },
            { key: 'income_statement', label: 'Income Statement Statement' }
        ];

        onMounted(async () => {
            await checkAuth();
            await loadAvailableWidgets();
        });

        return {
            isAuthenticated, password, loginError, login, logout, tab,
            companies, selectedCompanyId, isEditing, form, clearForm, selectCompany, saveCompany, syncData,
            users, permSelectedCompany, permSelectedUser, permissions, loadUsers, loadPermissions, savePermissions,
            availableWidgets, availableReports, toasts,
            showLogModal, activityLogs, viewLogs, refreshLogs, closeLogs,
            systemAuditLogs, fetchAuditLogs, openAuditTab
        };
    }
}).mount('#app');
</script>
</body>
</html>
